services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: imagemirror
      POSTGRES_USER: imagemirror
      POSTGRES_PASSWORD: imagemirror
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagemirror -d imagemirror"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-26379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  seed:
    build:
      context: ./image-mirror-api
    environment:
      APP_ROLE: seed
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      DEFAULT_IMAGE_MODEL: ${DEFAULT_IMAGE_MODEL:-gpt-image-2}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-5m}
      IMAGE_RETENTION: ${IMAGE_RETENTION:-24h}
      DEVELOPER_API_TIMEOUT: ${DEVELOPER_API_TIMEOUT:-300s}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:21580,http://localhost:25173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      DATABASE_URL: postgres://imagemirror:imagemirror@postgres:5432/imagemirror?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - image-storage:/data/images
    restart: "no"

  api:
    build:
      context: ./image-mirror-api
    environment:
      APP_ROLE: api
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: :8080
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      DEFAULT_IMAGE_MODEL: ${DEFAULT_IMAGE_MODEL:-gpt-image-2}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-5m}
      IMAGE_RETENTION: ${IMAGE_RETENTION:-24h}
      DEVELOPER_API_TIMEOUT: ${DEVELOPER_API_TIMEOUT:-300s}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:21580,http://localhost:25173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      DATABASE_URL: postgres://imagemirror:imagemirror@postgres:5432/imagemirror?sslmode=disable
      REDIS_ADDR: redis:6379
      STORAGE_ROOT: /data/images
      PUBLIC_BASE_URL: http://localhost:21580
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - image-storage:/data/images
    expose:
      - "8080"

  worker:
    build:
      context: ./image-mirror-api
    environment:
      APP_ROLE: worker
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      DEFAULT_IMAGE_MODEL: ${DEFAULT_IMAGE_MODEL:-gpt-image-2}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-5m}
      IMAGE_RETENTION: ${IMAGE_RETENTION:-24h}
      DEVELOPER_API_TIMEOUT: ${DEVELOPER_API_TIMEOUT:-300s}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:21580,http://localhost:25173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      DATABASE_URL: postgres://imagemirror:imagemirror@postgres:5432/imagemirror?sslmode=disable
      REDIS_ADDR: redis:6379
      STORAGE_ROOT: /data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - image-storage:/data/images

  web:
    build:
      context: ./image-mirror-web
    ports:
      - "${WEB_PORT:-21580}:80"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  image-storage:
